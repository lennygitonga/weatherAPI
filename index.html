    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Open Weather Indicator</title>
    </head>
    <body>
        <div>
            <h1>Open Weather Indicator</h1>
            <label for="locationInput">Enter Location:</label>
            <input type="text" id="locationInput" placeholder="e.g., Nairobi">
            <button id="weatherbutton" onclick="getWeatherData(document.getElementById('locationInput').value)">Get Weather</button>
        </div>
        <div id="weather"></div>
        <script src="script.js"></script>
    </body>
    </html>
